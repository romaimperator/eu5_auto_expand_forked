l_english:
  search_filter_location_has_auto_expand_rgo_name: "Auto-Expand R.G.O. Enabled"
  search_filter_location_has_auto_expand_rgo_desc: "Show locations with [rgo|e] auto-expand enabled"

  search_filter_location_not_has_auto_expand_rgo_name: "Auto-Expand R.G.O. Disabled"
  search_filter_location_not_has_auto_expand_rgo_desc: "Show locations with [rgo|e] auto-expand disabled"

  search_filter_location_food_rgo_food_value_name: "R.G.O. Food Value"
  search_filter_location_food_rgo_food_value_desc: "Show locations that have an [rgo|e] with a food value within the specified range"
  search_filter_location_food_rgo_food_value_format: "$VAL|0$"

  search_filter_building_only_auto_expand_name: "Auto-Expand Enabled"
  search_filter_building_only_auto_expand_desc: "Show buildings that have at least one location with auto-expand enabled"
  search_filter_building_only_not_auto_expand_name: "Auto-Expand Disabled"
  search_filter_building_only_not_auto_expand_desc: "Show buildings that have at least one location with auto-expand disabled"

  search_filter_lsq_location_wealth_name: "Tax Base"
  search_filter_lsq_location_wealth_desc: "Show locations within the specified tax base range"
  search_filter_lsq_location_wealth_format: "$VAL|0$"
  search_filter_lsq_location_raw_wealth_name: "Wealth"
  search_filter_lsq_location_raw_wealth_desc: "Show locations within the specified wealth range (unscaled by control)"
  search_filter_lsq_location_raw_wealth_format: "$VAL|0$"
  search_filter_lsq_location_total_building_levels_name: "Building Levels Filled"
  search_filter_lsq_location_total_building_levels_desc: "Show locations within the specified range of total building levels relative to supported capacity"
  search_filter_lsq_location_total_building_levels_format: "$VAL|%0$"
  search_filter_lsq_building_production_efficiency_name: "Production Efficiency"
  search_filter_lsq_building_production_efficiency_desc: "Show buildings within the specified production efficiency range"
  search_filter_lsq_building_production_efficiency_format: "$VAL|%0$"
  search_filter_lsq_building_level_name: "Building Level"
  search_filter_lsq_building_level_desc: "Show buildings within the specified level range"
  search_filter_lsq_building_level_format: "$VAL|0$"
  search_filter_lsq_location_food_potential_name: "Food Potential Per RGO Level"
  search_filter_lsq_location_food_potential_desc: "Show locations with food potential per [rgo|e] level within the specified range. Uses the same score as the Food Potential map mode (max 45 at the best non-special rural food rgo, higher for locations with rare static specials)."
  search_filter_lsq_location_food_potential_format: "$VAL|0$"
  search_filter_lsq_location_rgo_value_name: "R.G.O. Value"
  search_filter_lsq_location_rgo_value_desc: "Show locations where the [rgo|e] has a base market price within the specified range"
  search_filter_lsq_location_rgo_value_format: "$VAL|1$"
  search_filter_lsq_province_location_count_name: "Number of Locations"
  search_filter_lsq_province_location_count_desc: "Show provinces with a number of locations within the specified range"
  search_filter_lsq_province_location_count_format: "$VAL|0$"
  search_filter_lsq_location_attacker_penalty_name: "Attacker Penalty"
  search_filter_lsq_location_attacker_penalty_desc: "Show locations within the specified [combat|e] attacker penalty range from terrain"
  search_filter_lsq_location_attacker_penalty_format: "$VAL|0$"
  search_filter_lsq_location_good_migration_candidate_name: "Good Migration Candidate"
  search_filter_lsq_location_good_migration_candidate_desc: "Show locations under 30k pops with an [rgo|e] base value below 3 that aren't blocked from being upgraded"
