l_english:
 # Mod
 lsq_name: "Location Specialization QoL (Auto-Expand) - Forked - Local"
 lsq_desc: "Forked and updated by romaimperator from the original Location Specialization QoL (Auto-Expand) mod created by SilverSkye111. Adds the ability to set specific buildings to automatically expand and construct additional levels if they are profitable and pops are available.\\nAuto-Expand button is found when selecting individual locations and then clicking at one of their pop types to open the location specific construction menu.\\n\\nLoad after other UI mods if there are compatibility issues."

 # Construction (construction) Tab
 lsq__construction_name: "Construction"
 ## Settings (settings) Group
 lsq__construction__settings_name: "Settings"
 lsq__pause_auto_expand_name: "Pause auto-expand everywhere"
 lsq__pause_auto_expand_desc: ""
 lsq__should_not_upgrade_buildings_name: "Auto expand will upgrade buildings if they are obsolete"
 lsq__should_not_upgrade_buildings_desc: ""
 lsq__minimum_gold_for_buildings_name: "Gold to save before auto-expanding buildings:"
 lsq__minimum_gold_for_buildings_desc: "The gold to save is the amount of gold that must be available before any auto-expansion can occur. A building will not auto-expand if the gold to save plus the estimate cost of the next level is greater than the country's current ducats. Put another way, the amount of gold you will have will never drop below the gold to save value."
 lsq__minimum_gold_for_buildings_format: "[CMMV('lsq__minimum_gold_for_buildings')]@gold!"
 lsq__minimum_gold_for_rgos_name: "Gold to save before auto-expanding RGOs:"
 lsq__minimum_gold_for_rgos_desc: "The gold to save is the amount of gold that must be available before any auto-expansion can occur. An RGO will not auto-expand if the gold to save plus the estimate cost of the next level is greater than the country's current ducats. Put another way, the amount of gold you will have will never drop below the gold to save value."
 lsq__minimum_gold_for_rgos_format: "[CMMV('lsq__minimum_gold_for_rgos')]@gold!"
 lsq__minimum_gold_for_auto_build_name: "Gold to save before auto-building:"
 lsq__minimum_gold_for_auto_build_desc: "The gold to save is the amount of gold that must be available before any auto-building can occur. A building will not be auto-built if the gold to save plus the estimate cost is greater than the country's current ducats. Put another way, the amount of gold you will have will never drop below the gold to save value."
 lsq__minimum_gold_for_auto_build_format: "[CMMV('lsq__minimum_gold_for_auto_build')]@gold!"
 lsq__allowed_building_overbuild_levels_name: "Allowed overbuild levels (max 100):"
 lsq__allowed_building_overbuild_levels_desc: "How many total building levels a location may exceed its Supported Building Levels cap by before auto-expand will stop queueing new construction there. At zero, it won't allow any overbuilding."

 # Auto-Build (auto_build) Tab
 lsq__auto_build_name: "Auto-Build"
