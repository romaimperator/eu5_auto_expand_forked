l_english:
 # Mod
 lsq_name: "Location Specialization QoL (Auto-Expand) - Forked - Local"
 lsq_desc: "Forked and updated by romaimperator from the original Location Specialization QoL (Auto-Expand) mod created by SilverSkye111. Adds the ability to set specific buildings to automatically expand and construct additional levels if they are profitable and pops are available.\\nAuto-Expand button is found when selecting individual locations and then clicking at one of their pop types to open the location specific construction menu.\\n\\nLoad after other UI mods if there are compatibility issues."

 # Settings (settings) Tab
 lsq__settings_name: "Settings"
 ## Settings (settings) Group
 lsq__settings__settings_name: "Settings"
 lsq__pause_auto_expand_name: "Pause auto-expand everywhere"
 lsq__pause_auto_expand_desc: ""
 lsq__should_not_upgrade_buildings_name: "Auto expand will upgrade buildings if they are obsolete"
 lsq__should_not_upgrade_buildings_desc: ""
 lsq__upgrade_all_buildings_name: "Upgrade all buildings"
 lsq__upgrade_all_buildings_desc: "When enabled, automatically upgrades every building that has become obsolete, regardless of whether auto-expand is enabled for that building."
 lsq__minimum_gold_name: "Gold to save before auto-expanding/building:"
 lsq__minimum_gold_desc: "The minimum gold reserve. Buildings, RGOs, auto-build, and food auto-build will not be queued if it would leave the treasury below this amount."
 lsq__minimum_gold_format: "[CMMV('lsq__minimum_gold')]@gold!"
 lsq__allowed_building_overbuild_levels_name: "Allowed overbuild levels (max 100):"
 lsq__allowed_building_overbuild_levels_desc: "How many total building levels a location may exceed its Supported Building Levels cap by before auto-expand will stop queueing new construction there. At zero, it won't allow any overbuilding."
 lsq__minimum_profit_for_buildings_name: "Minimum profit for auto-expanding buildings:"
 lsq__minimum_profit_for_buildings_desc: "The minimum profit a production building must be generating before auto-expand will queue another level. This is the potential profit after control, but before tax. Only applies to production buildings (workshops, guilds, etc.), not to non-production buildings (temples, libraries, etc.) or auto-build buildings. Set to 0 to disable (any profitable building will expand)."
 lsq__minimum_profit_for_buildings_format: "[CMMV('lsq__minimum_profit_for_buildings')]@gold!"
 lsq__minimum_discount_for_food_auto_build_name: "Min discount for food auto-building:"
 lsq__minimum_discount_for_food_auto_build_desc: "The maximum acceptable market price impact from construction demand. Negative values mean cheaper materials, positive values allow a premium. Works the same as the auto-build min discount."
 lsq__minimum_discount_for_food_auto_build_format: "[SelectLocalization(GreaterThan_CFixedPoint(CMMV('lsq__minimum_discount_for_food_auto_build'), '(CFixedPoint)0'), 'lsq__minimum_discount_for_food_auto_build_format_red', 'lsq__minimum_discount_for_food_auto_build_format_green')]"
 lsq__minimum_discount_for_food_auto_build_format_red: "#R [CMMV('lsq__minimum_discount_for_food_auto_build')]%#!"
 lsq__minimum_discount_for_food_auto_build_format_green: "#G [CMMV('lsq__minimum_discount_for_food_auto_build')]%#!"

 # Mass Upgrade (mass_upgrade) Tab
 lsq__mass_upgrade_name: "Mass Upgrade"
 ## Building Upgrades (building_upgrades) Group
 lsq__mass_upgrade__building_upgrades_name: "Building Upgrades"
 ## Town to City (town_to_city) Group
 lsq__mass_upgrade__town_to_city_name: "Town to City"
 lsq__mass_upgrade_town_to_city_name: "Auto-upgrade towns to cities"
 lsq__mass_upgrade_town_to_city_desc: "When enabled, automatically queues construction of city upgrades in qualifying towns each month. Towns must meet the minimum control, market price, population, and gold requirements."
 lsq__mass_upgrade_town_to_city_min_control_name: "Minimum control:"
 lsq__mass_upgrade_town_to_city_min_control_desc: "A town must have at least this much control before it will be auto-upgraded to a city."
 lsq__mass_upgrade_town_to_city_min_control_format: "[CMMV('lsq__mass_upgrade_town_to_city_min_control')]%"
 lsq__mass_upgrade_town_to_city_min_discount_name: "Min discount:"
 lsq__mass_upgrade_town_to_city_min_discount_desc: "The maximum acceptable market price impact from construction demand. Negative values mean cheaper materials, positive values allow a premium. Works the same as the auto-build min discount."
 lsq__mass_upgrade_town_to_city_min_discount_format: "[SelectLocalization(GreaterThan_CFixedPoint(CMMV('lsq__mass_upgrade_town_to_city_min_discount'), '(CFixedPoint)0'), 'lsq__mass_upgrade_town_to_city_min_discount_format_red', 'lsq__mass_upgrade_town_to_city_min_discount_format_green')]"
 lsq__mass_upgrade_town_to_city_min_discount_format_red: "#R [CMMV('lsq__mass_upgrade_town_to_city_min_discount')]%#!"
 lsq__mass_upgrade_town_to_city_min_discount_format_green: "#G [CMMV('lsq__mass_upgrade_town_to_city_min_discount')]%#!"
 lsq__mass_upgrade_town_to_city_min_gold_name: "Gold to save:"
 lsq__mass_upgrade_town_to_city_min_gold_desc: "The gold reserve to keep. A city upgrade will not be queued if it would leave the treasury below this amount."
 lsq__mass_upgrade_town_to_city_min_gold_format: "[CMMV('lsq__mass_upgrade_town_to_city_min_gold')]@gold!"

