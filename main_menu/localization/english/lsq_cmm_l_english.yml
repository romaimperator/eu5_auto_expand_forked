l_english:
 # Mod
 lsq_name: "Location Specialization QoL (Auto-Expand) - Forked - Local"
 lsq_desc: "Forked and updated by romaimperator from the original Location Specialization QoL (Auto-Expand) mod created by SilverSkye111. Adds the ability to set specific buildings to automatically expand and construct additional levels if they are profitable and pops are available.\\nAuto-Expand button is found when selecting individual locations and then clicking at one of their pop types to open the location specific construction menu.\\n\\nLoad after other UI mods if there are compatibility issues."

 # Settings (settings) Tab
 lsq__settings_name: "Settings"
 ## Global Control (settings) Group
 lsq__settings__settings_name: "Global Control"
 lsq__pause_auto_expand_name: "Pause Automation"
 lsq__pause_auto_expand_desc: "Pauses all automation features: auto-expand buildings, auto-expand RGOs, upgrade all buildings, auto-build, auto-food, and auto-urbanize."
 lsq__minimum_gold_name: "Gold Reserve"
 lsq__minimum_gold_desc: "The minimum gold reserve to keep. Construction will not be queued if it would leave the treasury below this amount. Applies to all automation features except auto-urbanize upgrades (which have their own gold setting)."
 lsq__minimum_gold_format: "[CMMV('lsq__minimum_gold')]@gold!"
 lsq__allowed_building_overbuild_levels_name: "Overbuild Limit"
 lsq__allowed_building_overbuild_levels_desc: "How many total building levels a location may exceed its Supported Building Levels cap by before auto-expand will stop queueing new construction there. At zero, it won't allow any overbuilding."

 ## Priority List Group
 lsq__settings__priority_list_name: "Construction Automation"
 lsq__settings__priority_list_desc: "Drag to reorder feature priority. Each month, enabled features run top-to-bottom. Min Profit sets the minimum gold profit per level required to queue construction (0 = disabled). Min Discount sets the maximum construction material price markup allowed (-33% = only when cheap, 0 = at base price, +33% = even when inflated)."
 lsq__priority_list_item_column_name: "Feature"
 lsq__priority_list_i1_name: "Auto Expand Buildings"
 lsq__priority_list_i1_desc: "Automatically expands multi-level production and non-production buildings when profitable, pops are available, and gold is above the reserve threshold. Only applies in locations where auto-expand is toggled on."
 lsq__priority_list_i2_name: "Auto Expand RGOs"
 lsq__priority_list_i2_desc: "Automatically expands RGO levels in locations where auto-expand RGO is toggled on, when laborers are available and resources permit."
 lsq__priority_list_i3_name: "Auto Upgrade All Buildings"
 lsq__priority_list_i3_desc: "Automatically upgrades every building that has become obsolete, regardless of whether auto-expand is enabled for that building."
 lsq__priority_list_i4_name: "Auto Build"
 lsq__priority_list_i4_desc: "Automatically constructs one-per-location buildings (temples, libraries, etc.) in the order and with the settings configured on the Auto-Build tab."
 lsq__priority_list_i5_name: "Auto Food"
 lsq__priority_list_i5_desc: "Automatically builds food-producing RGOs and buildings in rural locations, picking the option with the highest marginal food output. Configured on the Auto-Food tab."
 lsq__priority_list_i6_name: "Auto Urbanize"
 lsq__priority_list_i6_desc: "Promotes location ranks each month: rural settlements to towns, and towns to cities. Rural-to-town requires 30,000 pops (immediately city-eligible) or within 1,000 of pop cap (otherwise growth would stall at the rural cap). Skips unintegrated locations. Configured on the Auto Urbanize tab."
 lsq__priority_list_i7_name: "Auto Build Capital Buildings"
 lsq__priority_list_i7_desc: "Automatically constructs capital-only buildings (royal court, supreme court, war college, etc.) in your capital location when conditions allow."
 lsq__priority_list__enabled_name: "Enabled"
 lsq__priority_list__enabled_desc: "Enable or disable this feature. Disabled features are skipped each month."
 lsq__priority_list__min_profit_name: "Min Profit"
 lsq__priority_list__min_profit_desc: "Minimum gold profit per level required before construction is queued. This is the raw profit before tax. Set to 0 to disable the profit check."
 lsq__priority_list__min_profit_postfix: "@gold!"
 lsq__priority_list__min_discount_name: "Min Discount"
 lsq__priority_list__min_discount_desc: "Maximum construction material price markup allowed. At -33%, only builds when materials cost 33% below base price. At 0%, only at base price or below. At +33%, builds even when prices are 33% above base."
 lsq__priority_list__min_discount_postfix: "%"
 lsq__priority_list__min_discount_prefix_high: "#R "
 lsq__priority_list__min_discount_postfix_high: "%#!"
 lsq__priority_list__min_discount_prefix_low: "#G "
 lsq__priority_list__min_discount_postfix_low: "%#!"

