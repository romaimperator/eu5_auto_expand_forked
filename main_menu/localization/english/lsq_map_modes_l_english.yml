l_english:
 mapmode_lsq_breadbasket_name: "Breadbaskets"
 MAPMODE_LSQ_BREADBASKET: "#T $mapmode_lsq_breadbasket_name$#!\nHighlights your [locations|e] where auto-food is currently set up to run."
 MAPMODE_LSQ_BREADBASKET_TT_ENABLED: "[ROOT.GetLocation.GetName] is set up for auto-food."
 MAPMODE_LSQ_BREADBASKET_TT_OWNED: "[ROOT.GetLocation.GetName] is yours but does not have auto-food enabled."
 MAPMODE_LSQ_BREADBASKET_TT_FOREIGN: "[ROOT.GetLocation.GetName] is not yours."
 MAPMODE_LSQ_BREADBASKET_TT_UNCOLONIZED: "[ROOT.GetLocation.GetName] is uncolonized."
 MAPMODE_LSQ_BREADBASKET_TT_WATER: "[ROOT.GetLocation.GetName] is a sea zone."

 lsq_breadbasket_enabled_legend_key: "Auto-food enabled"
 lsq_breadbasket_owned_legend_key: "Your other locations"
 lsq_breadbasket_foreign_legend_key: "Foreign locations"
 lsq_breadbasket_uncolonized_legend_key: "Uncolonized"

 mapmode_lsq_location_food_potential_name: "Food Potential Per RGO Level"
 MAPMODE_LSQ_LOCATION_FOOD_POTENTIAL: "#T $mapmode_lsq_location_food_potential_name$#!\nThis colors [locations|e] by their natural food potential per [rgo|e] level. The score combines the [rgo|e] [food|e] value, the cumulative [food_productivity|e] (terrain, vegetation, climate, named static modifiers like the Skane Herring Market or Fertile Nile Delta, [rgo|e]-specific output modifiers, etc.), water access, and the assumed-max bonuses from [ShowBuildingTypeName('windmill')], [ShowBuildingTypeName('farming_village')], and [ShowBuildingTypeName('irrigation_systems')] where the [rgo|e] permits.\n\nThe [development|e] contribution is excluded so the score reflects pure terrain potential rather than a snapshot of current investment."
 MAPMODE_LSQ_LOCATION_FOOD_POTENTIAL_TT_LAND: "[ROOT.GetLocation.GetName] has a food potential per [rgo|e] level of [ROOT.GetLocation.MakeScope.ScriptValue('lsq_location_food_potential')|1Y]."
 MAPMODE_LSQ_LOCATION_FOOD_POTENTIAL_TT_WATER: "[ROOT.GetLocation.GetName] is not land so it does not have food potential."

 lsq_location_food_potential_bright_green_legend_key: "45 (max possible)"
 lsq_location_food_potential_green_legend_key: "27.5 (excellent)"
 lsq_location_food_potential_yellow_legend_key: "20 (good)"
 lsq_location_food_potential_orange_legend_key: "12.5 (decent)"
 lsq_location_food_potential_red_legend_key: "3.75 (low)"
 lsq_location_food_potential_black_legend_key: "0 (none)"
